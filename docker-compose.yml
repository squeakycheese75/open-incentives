services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_PATH: /data/app.db
      DATABASE_SEED: "auto"
      SERVER_JWT_SECRET: "APIKEY123"
    volumes:
      - ./data:/data

  admin:
    build:
      context: ./apps/admin
    environment:
      API_BASE_URL: http://localhost:8080
    ports:
      - "3001:80"
    depends_on:
      - api

  demo-store:
    profiles:
      - demo-store
    build:
      context: ./apps/demo-store
    environment:
      INCENTIVES_API_URL: http://api:8080
      INCENTIVES_API_KEY: ${DEMO_STORE_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - api
